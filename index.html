<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Technical Task Manager</title>
  
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #fff;
      --primary: #4f46e5;
      --primary-soft: #eef2ff;
      --text: #111827;
      --muted: #6b7280;
      --danger: #ef4444;
      --success: #10b981;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: min(100%, 800px);
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      height: fit-content;
    }

    header {
      padding: 30px;
      background: var(--primary);
      color: white;
    }

    header h1 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: -0.02em; }
    header p { font-size: 0.9rem; opacity: 0.9; line-height: 1.5; }

    .main { padding: 25px; display: grid; gap: 20px; }

    .task-input {
      display: grid;
      gap: 15px;
      background: #f8fafc;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .task-input label { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }

    .task-input input, .task-input textarea, .task-input select {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px; /* Évite le zoom auto sur iPhone */
      background: white;
    }

    .task-input-actions { display: flex; gap: 10px; }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #saveButton { background: var(--primary); color: white; flex: 2; }
    .clear-btn { background: #e2e8f0; color: var(--text); flex: 1; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filters { display: flex; gap: 8px; }
    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      background: white;
      border: 1px solid #e2e8f0;
    }

    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .tasks { display: grid; gap: 15px; }

    .task-card {
      padding: 18px;
      border-radius: 16px;
      background: white;
      border: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
    }

    .task-card.completed { opacity: 0.6; }
    .task-card.completed .title { text-decoration: line-through; }

    .title { font-weight: 700; font-size: 1.1rem; }
    .desc { color: var(--muted); font-size: 0.95rem; }
    .tag {
      font-size: 0.75rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--primary-soft);
      color: var(--primary);
      width: fit-content;
    }

    .task-actions { display: flex; gap: 8px; }
    .task-actions button { flex: 1; font-size: 0.85rem; padding: 8px; }
    .complete { background: var(--success); color: white; }
    .edit { background: #f1f5f9; color: var(--text); }
    .delete { background: #fff1f2; color: var(--danger); }

    @media (max-width: 480px) {
      body { padding: 10px; }
      header { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 My Notes</h1>
      <p>Engineering & Data Task Manager. Stored locally.</p>
    </header>

    <section class="main">
      <form class="task-input" id="taskForm">
        <div>
          <label>Title</label>
          <input type="text" id="title" placeholder="What needs to be done?" required />
        </div>
        <div>
          <label>Priority</label>
          <select id="priority">
            <option value="Normal">Normal</option>
            <option value="High">High 🔥</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="task-input-actions">
          <button type="submit" id="saveButton">Add Task</button>
          <button type="button" class="clear-btn" id="clearForm">Clear</button>
        </div>
      </form>

      <div class="toolbar">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Done</button>
        </div>
        <div id="summaryText" style="font-size: 0.8rem; color: var(--muted);"></div>
      </div>

      <div class="tasks" id="taskList"></div>
    </section>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let editingId = null;
    let activeFilter = 'all';

    const render = () => {
      const list = document.getElementById('taskList');
      list.innerHTML = '';
      
      const filtered = tasks.filter(t => 
        activeFilter === 'all' ? true : (activeFilter === 'completed' ? t.completed : !t.completed)
      );

      filtered.forEach(t => {
        const el = document.createElement('div');
        el.className = `task-card ${t.completed ? 'completed' : ''}`;
        el.innerHTML = `
          <div>
            <div class="tag">${t.priority}</div>
            <div class="title" style="margin-top:8px">${t.title}</div>
          </div>
          <div class="task-actions">
            <button class="complete" onclick="toggle('${t.id}')">${t.completed ? 'Undo' : 'Done'}</button>
            <button class="edit" onclick="edit('${t.id}')">Edit</button>
            <button class="delete" onclick="del('${t.id}')">Del</button>
          </div>
        `;
        list.appendChild(el);
      });

      const done = tasks.filter(t => t.completed).length;
      document.getElementById('summaryText').textContent = `${done}/${tasks.length} completed`;
      localStorage.setItem('tasks', JSON.stringify(tasks));
    };

    document.getElementById('taskForm').onsubmit = (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const priority = document.getElementById('priority').value;

      if(editingId) {
        tasks = tasks.map(t => t.id === editingId ? {...t, title, priority} : t);
        editingId = null;
      } else {
        tasks.push({ id: Date.now().toString(), title, priority, completed: false });
      }
      
      document.getElementById('taskForm').reset();
      document.getElementById('saveButton').textContent = 'Add Task';
      render();
    };

    window.toggle = (id) => { tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t); render(); };
    window.del = (id) => { tasks = tasks.filter(t => t.id !== id); render(); };
    window.edit = (id) => {
      const t = tasks.find(t => t.id === id);
      document.getElementById('title').value = t.title;
      document.getElementById('priority').value = t.priority;
      editingId = id;
      document.getElementById('saveButton').textContent = 'Save Changes';
    };

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        render();
      };
    });

    render();
  </script>
</body>
</html>
